name: CD

# Continuous delivery: build a Docker image and publish it to GHCR on every
# push to main and on version tags. The optional deploy job ships it to a host
# over SSH — it stays inert until you set the `DEPLOY_ENABLED` repo variable to
# "true" and add the DEPLOY_* secrets (see docs/DEPLOYMENT.md), so this workflow
# is safe to merge with no infrastructure configured yet.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# One deploy at a time; cancel superseded image builds on the same ref.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  image:
    name: Build & publish image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7

      # GHCR image names must be lowercase; the repo owner (AO-KH) is not.
      - name: Compute lowercase image name
        id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags & labels
        id: tags
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.meta.outputs.image }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to host
    needs: image
    runs-on: ubuntu-latest
    # Inert until you opt in: set repo variable DEPLOY_ENABLED=true.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    environment: production
    steps:
      - uses: actions/checkout@v7

      - name: Copy production compose to host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: docker-compose.prod.yml
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Pull image & restart stack
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          # Pin to the exact digest built above — reproducible and roll-back-able.
          envs: IMAGE,GHCR_USER,GHCR_TOKEN,DEPLOY_PATH
          script_stop: true
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            docker logout ghcr.io
        env:
          IMAGE: ${{ needs.image.outputs.image }}@${{ needs.image.outputs.digest }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
